name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  # Nightly pinned to the patched cargo's version (no floating-channel re-sync).
  NIGHTLY: nightly-2026-06-04
  # Patched cargo: RFC 3176 multidep (rust-lang/cargo#17067) that arma's
  # two-target tatu artifact deps need until it lands in nightly.
  CARGO_PR_SHA: 0294a8367512e4eecf69c70e8ba69ba6f1eb1514

# Supported platforms (build + real guest boot, all required): Linux x86_64
# (KVM), Windows x86_64 (WHP), and macOS arm64 (HVF on a bare-metal
# organization runner). GitHub-hosted runners only cover the first two.
jobs:
  ci:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-24.04      # Linux x86_64 — full workspace + real KVM boot
            os: ubuntu-24.04
            runs_on: '["ubuntu-24.04"]'
            guest_musl: x86_64-unknown-linux-musl
          - name: windows-2025      # Windows x86_64 — build + real WHP boot
            os: windows-2025
            runs_on: '["windows-2025"]'
            guest_musl: x86_64-unknown-linux-musl
          - name: macos-arm64       # macOS arm64 — build + real HVF boot
            os: macos-arm64
            runs_on: '["self-hosted","macOS","ARM64","bare-metal","m1"]'
            guest_musl: aarch64-unknown-linux-musl
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        shell: bash
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --profile minimal --default-toolchain none
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup toolchain install "$NIGHTLY" --profile minimal --component rust-src
          rustup default "$NIGHTLY"
          # arma always emits both-arch PMIs (both tatu none targets); snuffler
          # is cross-built for the guest musl triple matching this host's arch.
          rustup target add x86_64-unknown-none aarch64-unknown-none "${{ matrix.guest_musl }}"

      - uses: Swatinem/rust-cache@v2

      - name: Cache patched cargo
        id: cargo-bin
        uses: actions/cache@v4
        with:
          path: cargo-bindeps
          key: cargo-bindeps-${{ matrix.name }}-${{ env.CARGO_PR_SHA }}

      - name: Build patched cargo
        if: steps.cargo-bin.outputs.cache-hit != 'true'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config cmake
          fi
          git clone --depth 200 https://github.com/npmccallum/cargo "$RUNNER_TEMP/cargo-src"
          git -C "$RUNNER_TEMP/cargo-src" checkout "$CARGO_PR_SHA"
          (cd "$RUNNER_TEMP/cargo-src" && cargo build --release)
          mkdir -p cargo-bindeps
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp "$RUNNER_TEMP/cargo-src/target/release/cargo.exe" cargo-bindeps/cargo.exe
          else
            cp "$RUNNER_TEMP/cargo-src/target/release/cargo" cargo-bindeps/cargo
          fi

      - name: Resolve cargo path
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "CARGO=$PWD/cargo-bindeps/cargo.exe" >> "$GITHUB_ENV"
          else
            echo "CARGO=$PWD/cargo-bindeps/cargo" >> "$GITHUB_ENV"
          fi

      - name: Versions
        shell: bash
        run: |
          "$CARGO" --version
          rustc --version

      - name: Enable KVM (Linux)
        # dillo-vm's unit tests (irqchip/irqfd) touch /dev/kvm during the plain
        # workspace test run, so access must be granted before it.
        if: runner.os == 'Linux'
        run: ls -l /dev/kvm && sudo chmod 666 /dev/kvm || true

      # `CARGO_BUILD_RUSTFLAGS: -D warnings` (set per cargo step below) makes the
      # build warning-clean-or-fail. It is the lowest-priority rustflags source,
      # so it applies to the host/workspace crates but is ignored for the musl
      # snuffler target, which keeps its own linker flags from .cargo/config.toml.
      # (Registry deps are cap-lints'd, so only our crates can fail it.) It is set
      # per-step, never globally, so it can't reach the patched-cargo build above.

      # Both platforms run the full workspace unit tests. The only members
      # Windows/macOS can't build are the genuinely Linux-only ones:
      # vhost-backend (vhost = a Linux kernel interface) and snuffler (the Linux
      # guest probe binary, cross-built as a dillo test artifact instead).
      # Everything else — the whole dillo stack with its WHP/HVF backend — is
      # built and tested for parity with Linux.
      - name: Test (Linux, full workspace)
        if: runner.os == 'Linux'
        shell: bash
        env:
          CARGO_BUILD_RUSTFLAGS: "-D warnings"
        run: |
          "$CARGO" test --workspace

      - name: Test (Windows, workspace minus Linux-only crates)
        if: runner.os == 'Windows'
        shell: bash
        env:
          CARGO_BUILD_RUSTFLAGS: "-D warnings"
        run: |
          "$CARGO" test --workspace --exclude vhost-backend --exclude snuffler

      - name: Test (macOS, workspace minus Linux-only crates)
        if: runner.os == 'macOS'
        shell: bash
        env:
          CARGO_BUILD_RUSTFLAGS: "-D warnings"
        run: |
          "$CARGO" test --workspace --exclude vhost-backend --exclude snuffler

      - name: Reserve hugepages for guest RAM (Linux/KVM)
        if: runner.os == 'Linux'
        run: |
          sudo sysctl -w vm.nr_hugepages=1024
          grep -i huge /proc/meminfo

      # Real guest boot on every platform — required, no skip. dillo builds its
      # per-OS backend (KVM on Linux, WHP on Windows, HVF on macOS) and boots an
      # Alpine same-arch guest; the test asserts the guest's self-report. A
      # runner that cannot boot fails loudly (see dillo/tests/boot.rs).
      - name: Boot tests (KVM / WHP / HVF)
        shell: bash
        env:
          CARGO_BUILD_RUSTFLAGS: "-D warnings"
        run: |
          "$CARGO" test -p dillo --features vm-tests -- --test-threads=1 --nocapture
