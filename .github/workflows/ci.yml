name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  NIGHTLY: nightly-2026-06-04

# Supported platforms are Linux x86_64/aarch64 (KVM), Windows x86_64 (WHP),
# and macOS arm64 (HVF on bare-metal organization runners).
jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install toolchain
        shell: bash
        run: |
          rustup toolchain install "$NIGHTLY" --profile minimal --component rustfmt
          rustup default "$NIGHTLY"

      - name: Check formatting
        shell: bash
        run: |
          cargo fmt --all -- --check

  ci:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-24.04      # Linux x86_64 - full workspace + real KVM boot
            os: ubuntu-24.04
            runs_on: '["ubuntu-24.04"]'
            guest_musl: x86_64-unknown-linux-musl
          - name: linux-arm64       # Linux arm64 - full workspace + real KVM boot
            os: linux-arm64
            runs_on: '["self-hosted","Linux","ARM64","bare-metal","aarch64","kvm"]'
            guest_musl: aarch64-unknown-linux-musl
          - name: windows-2025      # Windows x86_64 - build + real WHP boot
            os: windows-2025
            runs_on: '["windows-2025"]'
            guest_musl: x86_64-unknown-linux-musl
          - name: macos-arm64       # macOS arm64 - build + real HVF boot
            os: macos-arm64
            runs_on: '["self-hosted","macOS","ARM64","bare-metal","m1"]'
            guest_musl: aarch64-unknown-linux-musl
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install toolchain
        shell: bash
        run: |
          rustup toolchain install "$NIGHTLY" --profile minimal --component rust-src
          rustup default "$NIGHTLY"
          # arma embeds native-arch tatu; snuffler is cross-built for the guest
          # musl triple matching this host's arch.
          rustup target add x86_64-unknown-none aarch64-unknown-none "${{ matrix.guest_musl }}"

      - uses: Swatinem/rust-cache@v2

      - name: Versions
        shell: bash
        run: |
          cargo --version
          rustc --version

      - name: Enable KVM (Linux)
        # Backend tests and boot fixtures may touch /dev/kvm during the plain
        # workspace test run, so access must be granted before it.
        if: runner.os == 'Linux'
        run: ls -l /dev/kvm && sudo chmod 666 /dev/kvm || true

      # `CARGO_BUILD_RUSTFLAGS: -D warnings` (set per cargo step below) makes the
      # build warning-clean-or-fail. It is the lowest-priority rustflags source,
      # so it applies to the host/workspace crates but is ignored for the musl
      # snuffler target, which keeps its own linker flags from .cargo/config.toml.
      # (Registry deps are cap-lints'd, so only our crates can fail it.) It is set
      # per-step, never globally, so it can't reach the patched-cargo build above.

      # All platforms run the workspace unit tests, excluding only snuffler:
      # the Linux guest probe binary is cross-built as a dillo test artifact.
      # Everything else in the matrix is built and tested for parity with Linux.
      - name: Test (Linux, full workspace)
        if: runner.os == 'Linux'
        shell: bash
        env:
          CARGO_BUILD_RUSTFLAGS: "-D warnings"
        run: |
          cargo test --workspace

      - name: Test (Windows, workspace minus Linux-only crates)
        if: runner.os == 'Windows'
        shell: bash
        env:
          CARGO_BUILD_RUSTFLAGS: "-D warnings"
        run: |
          cargo test --workspace --exclude snuffler --exclude carapace

      - name: Test (macOS, workspace minus Linux-only crates)
        if: runner.os == 'macOS'
        shell: bash
        env:
          CARGO_BUILD_RUSTFLAGS: "-D warnings"
        run: |
          cargo test --workspace --exclude snuffler --exclude carapace

      - name: Reserve hugepages for guest RAM (Linux/KVM)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          pages=$(sysctl -n vm.nr_hugepages)
          if [ "$pages" -lt 1024 ]; then
            sudo sysctl -w vm.nr_hugepages=1024
          fi

          pages=$(sysctl -n vm.nr_hugepages)
          if [ "$pages" -lt 1024 ]; then
            echo "Linux runner must provide vm.nr_hugepages >= 1024; got $pages" >&2
            exit 1
          fi

          grep -i huge /proc/meminfo

      # Real guest boot on every platform. dillo builds its per-OS backend
      # (KVM on Linux, WHP on Windows, HVF on macOS) and boots an Alpine
      # same-arch guest; the test asserts the guest's self-report.
      - name: Boot tests (KVM / WHP / HVF)
        shell: bash
        env:
          CARGO_BUILD_RUSTFLAGS: "-D warnings"
        run: |
          cargo test -p dillo --features vm-tests -- --test-threads=1 --nocapture
