name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  NIGHTLY: nightly-2026-06-04

# Supported platforms are Linux x86_64 (KVM), Windows x86_64 (WHP), and macOS
# arm64 (HVF on a bare-metal organization runner). The macOS self-hosted runner
# is temporarily offline, so this workflow currently schedules only Linux and
# Windows. Restore the macOS matrix entry before final acceptance.
jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install toolchain
        shell: bash
        run: |
          rustup toolchain install "$NIGHTLY" --profile minimal --component rustfmt
          rustup default "$NIGHTLY"

      - name: Check formatting
        shell: bash
        run: |
          cargo fmt --all -- --check

  ci:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-24.04      # Linux x86_64 - full workspace + real KVM boot
            os: ubuntu-24.04
            runs_on: '["ubuntu-24.04"]'
            guest_musl: x86_64-unknown-linux-musl
          - name: windows-2025      # Windows x86_64 - build + real WHP boot
            os: windows-2025
            runs_on: '["windows-2025"]'
            guest_musl: x86_64-unknown-linux-musl
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install toolchain
        shell: bash
        run: |
          rustup toolchain install "$NIGHTLY" --profile minimal --component rust-src
          rustup default "$NIGHTLY"
          # arma embeds native-arch tatu; snuffler is cross-built for the guest
          # musl triple matching this host's arch.
          rustup target add x86_64-unknown-none aarch64-unknown-none "${{ matrix.guest_musl }}"

      - uses: Swatinem/rust-cache@v2

      - name: Versions
        shell: bash
        run: |
          cargo --version
          rustc --version

      - name: Enable KVM (Linux)
        # dillo-vm's unit tests (irqchip/irqfd) touch /dev/kvm during the plain
        # workspace test run, so access must be granted before it.
        if: runner.os == 'Linux'
        run: ls -l /dev/kvm && sudo chmod 666 /dev/kvm || true

      # `CARGO_BUILD_RUSTFLAGS: -D warnings` (set per cargo step below) makes the
      # build warning-clean-or-fail. It is the lowest-priority rustflags source,
      # so it applies to the host/workspace crates but is ignored for the musl
      # snuffler target, which keeps its own linker flags from .cargo/config.toml.
      # (Registry deps are cap-lints'd, so only our crates can fail it.) It is set
      # per-step, never globally, so it can't reach the patched-cargo build above.

      # Both platforms run the full workspace unit tests. The only members
      # Windows/macOS can't build are the genuinely Linux-only ones:
      # vhost-backend (vhost = a Linux kernel interface) and snuffler (the Linux
      # guest probe binary, cross-built as a dillo test artifact instead).
      # Everything else in the currently scheduled matrix is built and tested
      # for parity with Linux. Restore the macOS lane when its runner returns.
      - name: Test (Linux, full workspace)
        if: runner.os == 'Linux'
        shell: bash
        env:
          CARGO_BUILD_RUSTFLAGS: "-D warnings"
        run: |
          cargo test --workspace

      - name: Test (Windows, workspace minus Linux-only crates)
        if: runner.os == 'Windows'
        shell: bash
        env:
          CARGO_BUILD_RUSTFLAGS: "-D warnings"
        run: |
          cargo test --workspace --exclude vhost-backend --exclude snuffler

      - name: Test (macOS, workspace minus Linux-only crates)
        if: runner.os == 'macOS'
        shell: bash
        env:
          CARGO_BUILD_RUSTFLAGS: "-D warnings"
        run: |
          cargo test --workspace --exclude vhost-backend --exclude snuffler

      - name: Sign dillo for HVF (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          CARGO_BUILD_RUSTFLAGS: "-D warnings"
        run: |
          cargo test -p dillo --features vm-tests --no-run
          cat > "$RUNNER_TEMP/hypervisor.entitlements" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.hypervisor</key>
            <true/>
          </dict>
          </plist>
          EOF
          for bin in target/debug/dillo target/debug/deps/dillo-*; do
            [ -f "$bin" ] || continue
            [ -x "$bin" ] || continue
            file "$bin" | grep -q 'Mach-O' || continue
            codesign --force --sign - --entitlements "$RUNNER_TEMP/hypervisor.entitlements" "$bin"
            codesign --display --entitlements :- "$bin"
          done

      - name: Reserve hugepages for guest RAM (Linux/KVM)
        if: runner.os == 'Linux'
        run: |
          sudo sysctl -w vm.nr_hugepages=1024
          grep -i huge /proc/meminfo

      # Real guest boot on every currently scheduled platform. dillo builds its
      # per-OS backend (KVM on Linux, WHP on Windows) and boots an Alpine
      # same-arch guest; the test asserts the guest's self-report. Restore the
      # macOS/HVF boot lane before final acceptance.
      - name: Boot tests (KVM / WHP)
        shell: bash
        env:
          CARGO_BUILD_RUSTFLAGS: "-D warnings"
        run: |
          cargo test -p dillo --features vm-tests -- --test-threads=1 --nocapture
