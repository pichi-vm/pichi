name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  # Nightly pinned to the patched cargo's version (no floating-channel re-sync).
  NIGHTLY: nightly-2026-06-04
  # Patched cargo: RFC 3176 multidep (rust-lang/cargo#17067) that arma's
  # two-target tatu artifact deps need until it lands in nightly.
  CARGO_PR_SHA: 0294a8367512e4eecf69c70e8ba69ba6f1eb1514

# Supported platforms (build + real guest boot, both required): Linux x86_64
# (KVM) and Windows x86_64 (WHP). No other platform is enabled in CI: GitHub's
# hosted runners offer nested virtualization only on Linux x86, so arm Linux,
# macOS, and Windows-on-arm can't boot a guest here; macOS/x86 additionally has
# no backend. See PLATFORMS.md for the full matrix and how to light the rest up
# on bare-metal runners later.
jobs:
  ci:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04        # Linux x86_64 — full workspace + real KVM boot
            guest_musl: x86_64-unknown-linux-musl
          - os: windows-2025        # Windows x86_64 — build + real WHP boot
            guest_musl: x86_64-unknown-linux-musl
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        shell: bash
        run: |
          rustup toolchain install "$NIGHTLY" --profile minimal --component rust-src
          rustup default "$NIGHTLY"
          # arma always emits both-arch PMIs (both tatu none targets); snuffler
          # is cross-built for the guest musl triple matching this host's arch.
          rustup target add x86_64-unknown-none aarch64-unknown-none "${{ matrix.guest_musl }}"

      - uses: Swatinem/rust-cache@v2

      - name: Cache patched cargo
        id: cargo-bin
        uses: actions/cache@v4
        with:
          path: cargo-bindeps
          key: cargo-bindeps-${{ matrix.os }}-${{ env.CARGO_PR_SHA }}

      - name: Build patched cargo
        if: steps.cargo-bin.outputs.cache-hit != 'true'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config cmake
          fi
          git clone --depth 200 https://github.com/npmccallum/cargo "$RUNNER_TEMP/cargo-src"
          git -C "$RUNNER_TEMP/cargo-src" checkout "$CARGO_PR_SHA"
          (cd "$RUNNER_TEMP/cargo-src" && cargo build --release)
          mkdir -p cargo-bindeps
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp "$RUNNER_TEMP/cargo-src/target/release/cargo.exe" cargo-bindeps/cargo.exe
          else
            cp "$RUNNER_TEMP/cargo-src/target/release/cargo" cargo-bindeps/cargo
          fi

      - name: Resolve cargo path
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "CARGO=$PWD/cargo-bindeps/cargo.exe" >> "$GITHUB_ENV"
          else
            echo "CARGO=$PWD/cargo-bindeps/cargo" >> "$GITHUB_ENV"
          fi

      - name: Versions
        shell: bash
        run: |
          "$CARGO" --version
          rustc --version

      - name: Enable KVM (Linux)
        # dillo-vm's unit tests (irqchip/irqfd) touch /dev/kvm during the plain
        # workspace test run, so access must be granted before it.
        if: runner.os == 'Linux'
        run: ls -l /dev/kvm && sudo chmod 666 /dev/kvm || true

      # `CARGO_BUILD_RUSTFLAGS: -D warnings` (set per cargo step below) makes the
      # build warning-clean-or-fail. It is the lowest-priority rustflags source,
      # so it applies to the host/workspace crates but is ignored for the musl
      # snuffler target, which keeps its own linker flags from .cargo/config.toml.
      # (Registry deps are cap-lints'd, so only our crates can fail it.) It is set
      # per-step, never globally, so it can't reach the patched-cargo build above.

      # Linux builds every member, including the Linux-only guest binary snuffler
      # and the vhost-backend. Windows can't host-build those, so there we test
      # the portable crates + arma explicitly; dillo (with its WHP backend) is
      # built and exercised by the boot step.
      - name: Test (Linux, full workspace)
        if: runner.os == 'Linux'
        shell: bash
        env:
          CARGO_BUILD_RUSTFLAGS: "-D warnings"
        run: |
          "$CARGO" test --workspace

      - name: Test (Windows, portable + arma)
        if: runner.os == 'Windows'
        shell: bash
        env:
          CARGO_BUILD_RUSTFLAGS: "-D warnings"
        run: |
          "$CARGO" test -p pmi -p devtree -p dtb2acpi -p dtb2e820 -p burrow -p arma

      - name: Reserve hugepages for guest RAM (Linux/KVM)
        if: runner.os == 'Linux'
        run: |
          sudo sysctl -w vm.nr_hugepages=1024
          grep -i huge /proc/meminfo

      # Real guest boot on both platforms — required, no skip. dillo builds its
      # per-OS backend (KVM on Linux, WHP on Windows) and boots an Alpine guest;
      # the test asserts the guest's self-report. A runner that cannot boot fails
      # loudly (see dillo/tests/boot.rs) — this is what must never break.
      - name: Boot tests (KVM / WHP)
        shell: bash
        env:
          CARGO_BUILD_RUSTFLAGS: "-D warnings"
        run: |
          "$CARGO" test -p dillo --features vm-tests -- --test-threads=1
