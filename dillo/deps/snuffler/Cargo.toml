[package]
name = "snuffler"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
description = "Guest probe (PID 1) that snuffles out the booted machine's devices and emits a Report; also the shared Report schema."

# This crate is both halves of the e2e contract:
#   * the library (src/lib.rs) is the `Report` wire schema — host harnesses
#     decode it;
#   * the binary (src/main.rs) is the guest probe — host tests pull it as an
#     artifact dependency cross-built for the guest's musl target.
# rustix/serde_json are only used by the binary; they're plain deps (not behind
# a feature) because gating the bin on a feature interacts badly with artifact
# dependencies — a feature requested on the artifact dep lands on the host lib
# instance, not the cross-built bin, so the bin gets skipped. They're cheap and
# unused by the library, so a host consumer of the lib pays almost nothing.

# The guest init bin has no unit tests — it is validated by real boots (dillo's
# e2e suite). Skip its test-harness build: under `cargo test`, `fn main` is
# `#[cfg(not(test))]` and drops out, which would flag every init helper as dead
# code under `-D warnings`. The library half keeps its normal test harness.
[[bin]]
name = "snuffler"
path = "src/main.rs"
test = false

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# rustix provides safe syscall wrappers (linux_raw backend → no libc, no
# unsafe in our code). Guest-probe-only, so Linux features are fine.
rustix = { version = "1", default-features = false, features = [
    "std",
    "fs",
    "mount",
    "system",
    "stdio",
    "process",
] }
# AF_VSOCK has no safe rustix wrapper; the `vsock` crate provides a std::io
# stream (its unsafe/libc is internal — our code stays unsafe-free). Used only
# by the guest probe (src/main.rs) when `dillo.vsock_port=N` is on the cmdline.
#
# Unix-only, and TARGET-gated (not feature-gated): the `vsock` crate has no
# Windows support, and dillo pulls snuffler's *library* as a `lib = true`
# artifact dep cross-built for its host — including the Windows (WHP) lane.
# The library half (src/lib.rs) is only the `Report` schema and never touches
# vsock, so gating the crate behind `cfg(unix)` keeps the Windows host build of
# the lib clean while the cross-built musl guest bin (always unix) still gets
# it. Feature-gating would not work here — a feature on the artifact dep lands
# on the host lib instance, not the cross-built bin (see the rustix note above).
[target.'cfg(unix)'.dependencies]
vsock = "0.5"
