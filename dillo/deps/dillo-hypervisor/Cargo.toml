[package]
name = "dillo-hypervisor"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license.workspace = true
description = "Hypervisor abstraction for dillo (KVM/HVF/WHP)."

[dependencies]
thiserror.workspace = true
pmi.workspace = true
vm-memory.workspace = true

[target.'cfg(target_os = "linux")'.dependencies]
kvm-ioctls.workspace = true
kvm-bindings.workspace = true
nix.workspace = true

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.61", features = ["Win32_System_Hypervisor"] }
log.workspace = true

# HVF binding of record (macOS/aarch64). applevisor = safe wrapper;
# applevisor-sys = raw FFI for the newest hv_gic_* APIs the safe layer
# may not yet cover (used under justified #[allow(unsafe_code)]).
[target.'cfg(target_os = "macos")'.dependencies]
applevisor = "1"
applevisor-sys = "1"

[lints]
workspace = true
