[package]
name = "pichi-import"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lints]
workspace = true

[lib]
# Library is consumed by the root `pichi` binary's `pichi import`
# subcommand and (via `pub use` of verity::*) by the `pichi pull`
# path. No [[bin]] — the binary surface is `pichi import`.

[dependencies]
anyhow.workspace = true
thiserror.workspace = true
pichi-artifact.workspace = true
pichi-storage.workspace = true
sha2.workspace = true
hex.workspace = true
log.workspace = true
tempfile.workspace = true
# `spawn_blocking` for the CPU-bound cow/verity/sha256 staging that must not
# run on a runtime worker thread; the blob commits are awaited async.
tokio = { workspace = true, features = ["rt"] }
# SEEK_DATA/SEEK_HOLE (safe wrapper over lseek) so `import raw` skips the gaps
# in large sparse disk images instead of reading (and zero-scanning) them.
# Unix-only usage; the code falls back to sequential reads elsewhere.
[target.'cfg(any(target_os = "linux", target_os = "macos"))'.dependencies]
rustix = { version = "1", features = ["fs"] }

[dev-dependencies]
tempfile.workspace = true
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros"] }
